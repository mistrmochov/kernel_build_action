# A simple action usage
name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Build Kernel
        uses: mistrmochov/kernel_build_action@main
        with:
          kernel-url: https://github.com/mistrmochov/nothing_android_kernel_sm7325.git
          kernel-dir: false
          kernel-branch: RKSU-SUSFSv2.0.0
          config: vendor/lahaina-qgki_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: false
          ksu: false
          ksu-version: false
          ksu-other: false
          ksu-url : https://github.com/sidex15/KernelSU-Next.git
          android-version: 13
          aosp-clang-version: false
          other-clang-url: https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz
          other-clang-branch: main
          disable-lto: true
          anykernel3: true
          anykernel3-url: https://github.com/William24hmar/AnyKernel3.git
